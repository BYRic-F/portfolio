<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════════════════════════════════════
       OPEN GRAPH — LinkedIn / Facebook / Slack
  ══════════════════════════════════════════ -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://portfolio-f-bayen.streamlit.app/" />
  <meta property="og:title"       content="Portfolio · F. Bayen" />
  <meta property="og:description" content="Découvrez mes projets data science, visualisations et applications interactives. Explorez mon portfolio en ligne." />
  <!-- 🔴 Remplace l'URL ci-dessous par une vraie image hébergée (1200×630 px recommandé) -->
  <meta property="og:image"       content="https://portfolio-f-bayen.streamlit.app/preview.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"      content="fr_FR" />
  <meta property="og:site_name"   content="Portfolio F. Bayen" />

  <!-- Twitter Card (bonus) -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Portfolio · F. Bayen" />
  <meta name="twitter:description" content="Projets data science, visualisations et applications interactives." />
  <meta name="twitter:image"       content="https://portfolio-f-bayen.streamlit.app/preview.png" />

  <!-- SEO basique -->
  <meta name="description" content="Portfolio de F. Bayen — projets data science, visualisations et applications interactives." />
  <title>Portfolio · F. Bayen</title>

  <!-- Redirection automatique après 2 s -->
  <meta http-equiv="refresh" content="2; url=https://portfolio-f-bayen.streamlit.app/" />
  <link rel="canonical" href="https://portfolio-f-bayen.streamlit.app/" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #1e1e2e;
      --accent:  #e8ff47;
      --accent2: #47c8ff;
      --text:    #e8e8f0;
      --muted:   #6868a0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    /* ── glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--accent);  top: -200px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -100px; animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .badge {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: .35em 1em;
      border-radius: 999px;
      animation: fadeUp .6s ease both;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1.05;
      animation: fadeUp .6s .1s ease both;
    }
    .title em {
      font-style: italic;
      color: var(--accent);
    }

    .sub {
      font-size: .8rem;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.7;
      animation: fadeUp .6s .2s ease both;
    }

    /* ── progress bar ── */
    .progress-wrap {
      width: 220px;
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      animation: fadeUp .6s .3s ease both;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      animation: fill 2s linear forwards;
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .redirect-msg {
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp .6s .35s ease both;
    }

    /* ── CTA link (fallback) ── */
    .cta {
      margin-top: .5rem;
      font-size: .75rem;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
      animation: fadeUp .6s .4s ease both;
    }
    .cta:hover { border-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="stage">
    <span class="badge">Portfolio</span>

    <h1 class="title">F.&thinsp;<em>Bayen</em></h1>

    <p class="sub">Data Science · Visualisation · Applications interactives</p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <p class="redirect-msg">Redirection en cours…</p>

    <a class="cta" href="https://portfolio-f-bayen.streamlit.app/">
      Cliquer ici si la redirection ne fonctionne pas →
    </a>
  </main>

  <script>
    // Redirection JS en secours
    setTimeout(() => {
      window.location.replace("https://portfolio-f-bayen.streamlit.app/");
    }, 2000);
  </script>
</body>
</html>
